<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soumya Sri Kesani — Data Scientist</title>
  <meta name="description" content="Portfolio of Soumya Sri Kesani — Data Science & Analytics projects across NLP, forecasting, machine learning, visualization, and geospatial." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="#top" class="brand">SK</a>
    <nav class="nav">
      <a href="#projects">Projects</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
        <span class="theme-icon">◐</span>
      </button>
    </nav>
  </header>

  <main id="top">
    <!-- HERO -->
    <section class="hero">
      <p class="hero-eyebrow" id="hero-eyebrow"></p>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-actions">
        <a href="#projects" class="btn btn-primary">View projects</a>
        <a href="#contact" class="btn btn-ghost">Get in touch</a>
      </div>
      <div class="hero-meta" id="hero-meta"></div>
    </section>

    <!-- FEATURED -->
    <section id="featured" class="section featured-section hidden">
      <h2 class="section-title">Featured</h2>
      <div class="featured-grid" id="featured-grid"></div>
    </section>

    <!-- PROJECTS -->
    <section id="projects" class="section">
      <div class="section-head">
        <h2 class="section-title">Projects</h2>
        <p class="section-sub">Live from GitHub plus selected work, grouped by theme.</p>
      </div>

      <div class="filters" id="filters"></div>

      <div id="projects-root">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Loading projects from GitHub…</p>
        </div>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="about" class="section about-section">
      <h2 class="section-title">About</h2>
      <p class="about-text" id="about-text"></p>
      <div class="skills" id="skills"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="section contact-section">
      <h2 class="section-title">Let's talk</h2>
      <p class="contact-sub">Open to data science, analytics, and ML roles.</p>
      <div class="contact-links" id="contact-links"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p id="footer-text"></p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
